<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Insendra — Client Dashboard</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%236D4DF4'/><text x='16' y='22' text-anchor='middle' font-family='sans-serif' font-size='18' font-weight='700' fill='white'>i</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans','Segoe UI',sans-serif;background:#F0F1F7;color:#16122B;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#DDDDE8;border-radius:2px;}
table{border-spacing:0;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;
const PROXY = window.location.origin;

const T = {
  purple:"#6D4DF4",purpleL:"#EEE9FF",
  green:"#00C48C",greenL:"#D6F7EE",
  red:"#F04E55",redL:"#FEEAEB",
  orange:"#F59E0B",orangeL:"#FEF3C7",
  blue:"#3B82F6",blueL:"#DBEAFE",
  text:"#16122B",mid:"#3F3A5A",sub:"#72748C",
  white:"#FFFFFF",bg:"#F0F1F7",border:"#E4E4EF",
  mono:"'DM Mono',monospace",
};

const $m = n => {
  if (n==null||isNaN(n)) return "—";
  if (n>=1e6) return `$${(n/1e6).toFixed(2)}M`;
  if (n>=1e3) return `$${(n/1e3).toFixed(1)}K`;
  return `$${Math.round(n).toLocaleString()}`;
};
const pct  = n => n==null?"—":`${(n*100).toFixed(1)}%`;
const fnum = n => n==null?"—":n>=1e6?`${(n/1e6).toFixed(1)}M`:n>=1e3?`${(n/1e3).toFixed(1)}K`:Math.round(n).toLocaleString();
const fdate= s => { if(!s) return "—"; try{return new Date(s).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"2-digit"})}catch{return "—"} };
const fmon = s => { if(!s) return ""; try{const[y,m]=s.split("-");return new Date(+y,+m-1,1).toLocaleString("en-US",{month:"short",year:"2-digit"})}catch{return s} };

const openC  = r => r==null?T.sub:r>=0.25?T.green:r>=0.15?T.orange:T.red;
const clickC = r => r==null?T.sub:r>=0.02?T.green:r>=0.01?T.orange:T.red;

async function loadKlaviyoData(klaviyoKey) {
  const r = await fetch(`${PROXY}/klaviyo-data`,{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({klaviyoKey}),
  });
  const j = await r.json();
  if (!r.ok) throw new Error(j.error||`Server error ${r.status}`);
  return j;
}

async function loadInsights(d) {
  const camps   = (d.campaigns||[]).filter(c=>c.open_rate!=null);
  const topC    = [...(d.campaigns||[])].sort((a,b)=>(b.revenue||0)-(a.revenue||0)).slice(0,3);
  const lowOpen = [...camps].sort((a,b)=>a.open_rate-b.open_rate).slice(0,3);
  const flows   = d.flows||[];
  const avgOpen = camps.length?camps.reduce((s,c)=>s+c.open_rate,0)/camps.length:null;
  const cRev    = (d.campaigns||[]).reduce((s,c)=>s+(c.revenue||0),0);
  const fRev    = flows.reduce((s,f)=>s+(f.revenue||0),0);

  const prompt = `You are a senior Klaviyo email strategist. Analyze this account and return exactly 5 sharp insights as a JSON array.

ACCOUNT: ${d.account?.name} | PERIOD: Last 12 months
REVENUE: total=${$m(cRev+fRev)} campaigns=${$m(cRev)} flows=${$m(fRev)}
AVG OPEN: ${avgOpen!=null?pct(avgOpen):"no data"} (benchmark 25-35%)
CAMPAIGNS: ${(d.campaigns||[]).length} sent | LIVE FLOWS: ${flows.filter(f=>f.status==="live").length}
AUDIENCES: ${d.list_count||0} lists, ${d.segment_count||0} segments

TOP CAMPAIGNS BY REVENUE:
${topC.map(c=>`  ${c.name}: ${$m(c.revenue)}, ${pct(c.open_rate)} open, ${pct(c.click_rate)} click`).join("\n")||"  No revenue data"}

LOWEST OPEN CAMPAIGNS:
${lowOpen.map(c=>`  ${c.name}: ${pct(c.open_rate)}`).join("\n")||"  No data"}

FLOWS:
${flows.map(f=>`  ${f.name} (${f.trigger_type||"?"}, ${f.status}): ${$m(f.revenue)}, ${pct(f.open_rate)} open, ${fnum(f.recipients)} recipients`).join("\n")||"  None"}

Return ONLY JSON, no markdown:
[{"type":"good"|"warn"|"info","emoji":"<emoji>","title":"<7 words max>","body":"<2 sentences, specific numbers, concrete next action>"}]`;

  const r = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1500,
      system:"Return ONLY valid JSON arrays. No markdown. No prose.",
      messages:[{role:"user",content:prompt}]}),
  });
  if (!r.ok) throw new Error("AI request failed");
  const data = await r.json();
  const raw  = (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
  return JSON.parse(raw.replace(/```json\s*/g,"").replace(/```\s*/g,"").trim());
}

// ── Shared UI primitives ──────────────────────────────────────────

const Spin = ({s=20,c=T.purple}) => (
  <span style={{display:"inline-block",width:s,height:s,border:`2px solid ${c}22`,
    borderTopColor:c,borderRadius:"50%",animation:"spin .6s linear infinite"}}/>
);

const Card = ({children,style={}}) => (
  <div style={{background:T.white,border:`1px solid ${T.border}`,borderRadius:14,...style}}>
    {children}
  </div>
);

const SectionHead = ({title,sub,right}) => (
  <div style={{padding:"14px 20px",borderBottom:`1px solid ${T.border}`,
    display:"flex",alignItems:"center",justifyContent:"space-between"}}>
    <div>
      <div style={{fontSize:13,fontWeight:700,color:T.text}}>{title}</div>
      {sub&&<div style={{fontSize:11,color:T.sub,marginTop:2}}>{sub}</div>}
    </div>
    {right}
  </div>
);

const RatePill = ({val,type="open"}) => {
  const c = type==="open"?openC(val):clickC(val);
  return (
    <span style={{fontSize:12,fontWeight:600,fontFamily:T.mono,padding:"2px 7px",
      borderRadius:6,background:c===T.sub?"#F0F1F7":c+"18",color:c===T.sub?"#9394AB":c}}>
      {pct(val)}
    </span>
  );
};

// ── Klaviyo charts ────────────────────────────────────────────────

function RevenueChart({monthly}) {
  const ref = useRef(null);
  const inst= useRef(null);
  const has = monthly?.some(m=>m.revenue>0);

  useEffect(()=>{
    if (!ref.current||!has) return;
    if (inst.current){inst.current.destroy();inst.current=null;}
    const ctx  = ref.current.getContext("2d");
    const grad = ctx.createLinearGradient(0,0,0,230);
    grad.addColorStop(0,"rgba(109,77,244,0.14)");
    grad.addColorStop(1,"rgba(109,77,244,0)");
    inst.current = new window.Chart(ctx,{
      type:"line",
      data:{
        labels:monthly.map(m=>fmon(m.month)),
        datasets:[{
          data:monthly.map(m=>+(m.revenue||0).toFixed(2)),
          borderColor:T.purple,backgroundColor:grad,fill:true,tension:0.4,
          pointRadius:4,pointHoverRadius:7,
          pointBackgroundColor:T.white,pointBorderColor:T.purple,pointBorderWidth:2,
          borderWidth:2.5,
        }],
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{
          legend:{display:false},
          tooltip:{backgroundColor:T.text,padding:10,
            titleFont:{family:"DM Sans",size:11},bodyFont:{family:"DM Mono",size:13},
            callbacks:{
              title:items=>fmon(monthly[items[0].dataIndex]?.month)||"",
              label:c=>`  $${c.parsed.y.toLocaleString("en-US",{minimumFractionDigits:0})}`,
            }}
        },
        scales:{
          y:{beginAtZero:true,grid:{color:"rgba(0,0,0,0.04)"},border:{display:false},
            ticks:{font:{family:"DM Mono",size:11},color:T.sub,
              callback:v=>v>=1000?`$${Math.round(v/1000)}K`:`$${v}`}},
          x:{grid:{display:false},border:{display:false},
            ticks:{font:{family:"DM Sans",size:11},color:T.sub}},
        }
      }
    });
    return()=>{if(inst.current){inst.current.destroy();inst.current=null;}};
  },[monthly,has]);

  if (!has) return (
    <div style={{height:200,display:"flex",flexDirection:"column",alignItems:"center",
      justifyContent:"center",color:T.sub,gap:8}}>
      <div style={{fontSize:28}}>📊</div>
      <div style={{fontSize:13,fontWeight:600,color:T.mid}}>Revenue tracking unavailable</div>
      <div style={{fontSize:12,maxWidth:260,textAlign:"center",lineHeight:1.6}}>
        Add a <strong>Placed Order</strong> metric in Klaviyo to enable revenue reporting
      </div>
    </div>
  );
  return <div style={{position:"relative",height:230}}><canvas ref={ref}/></div>;
}

const Th = ({col,cur,dir,onSort,children,right=false}) => (
  <th onClick={()=>onSort(col)} style={{
    padding:"9px 14px",fontSize:10,fontWeight:700,letterSpacing:"0.08em",
    textTransform:"uppercase",cursor:"pointer",userSelect:"none",whiteSpace:"nowrap",
    textAlign:right?"right":"left",borderBottom:`1px solid ${T.border}`,
    color:cur===col?T.purple:T.sub,background:"#FAFAFD",
  }}>
    {children}{cur===col?(dir==="asc"?" ↑":" ↓"):""}
  </th>
);

function CampaignTable({campaigns,hasRev,debug}) {
  const [col,setCol] = useState(hasRev?"revenue":"send_time");
  const [dir,setDir] = useState("desc");
  const onSort = c => { if(c===col)setDir(d=>d==="desc"?"asc":"desc"); else{setCol(c);setDir("desc");} };
  const rows = useMemo(()=>[...campaigns].sort((a,b)=>{
    const av=a[col],bv=b[col];
    if(av==null)return dir==="desc"?1:-1; if(bv==null)return dir==="desc"?-1:1;
    if(typeof av==="string")return dir==="desc"?bv.localeCompare(av):av.localeCompare(bv);
    return dir==="desc"?bv-av:av-bv;
  }),[campaigns,col,dir]);

  if (!campaigns.length) return (
    <div style={{padding:"32px 24px",textAlign:"center",color:T.sub,fontSize:13}}>
      <div style={{marginBottom:8}}>No sent campaigns found</div>
      {debug && (
        <div style={{display:"inline-block",textAlign:"left",padding:"10px 14px",
          background:"#F8F7FF",border:`1px solid ${T.border}`,borderRadius:8,
          fontSize:11,fontFamily:T.mono,lineHeight:1.9}}>
          <div>Total campaigns in account: <b>{debug.all_campaign_count}</b></div>
          <div>Statuses seen: <b>{debug.campaign_statuses?.join(", ")||"none"}</b></div>
          <div>Conversion metric: <b>{debug.conv_metric_name||"none found"}</b></div>
          <div>Flow stats rows: <b>{debug.flow_stats_rows}</b></div>
        </div>
      )}
    </div>
  );
  return (
    <div style={{overflowX:"auto"}}>
      <table style={{width:"100%",borderCollapse:"collapse"}}>
        <thead><tr>
          <Th col="name"             cur={col} dir={dir} onSort={onSort}>Campaign</Th>
          <Th col="send_time"        cur={col} dir={dir} onSort={onSort}>Sent</Th>
          <Th col="recipients"       cur={col} dir={dir} onSort={onSort} right>Recipients</Th>
          <Th col="open_rate"        cur={col} dir={dir} onSort={onSort} right>Open %</Th>
          <Th col="click_rate"       cur={col} dir={dir} onSort={onSort} right>Click %</Th>
          <Th col="unsubscribe_rate" cur={col} dir={dir} onSort={onSort} right>Unsub %</Th>
          {hasRev&&<Th col="revenue"     cur={col} dir={dir} onSort={onSort} right>Revenue</Th>}
          {hasRev&&<Th col="rpr"         cur={col} dir={dir} onSort={onSort} right>RPR</Th>}
          {hasRev&&<Th col="conversions" cur={col} dir={dir} onSort={onSort} right>Convs</Th>}
        </tr></thead>
        <tbody>
          {rows.map((c,i)=>(
            <tr key={c.id} style={{borderBottom:`1px solid ${T.border}`,background:i%2===0?T.white:"#FBFBFE"}}>
              <td style={{padding:"10px 14px",maxWidth:220,overflow:"hidden",textOverflow:"ellipsis",
                whiteSpace:"nowrap",fontSize:13,fontWeight:500}} title={c.name}>{c.name}</td>
              <td style={{padding:"10px 14px",fontSize:12,color:T.sub,whiteSpace:"nowrap"}}>{fdate(c.send_time)}</td>
              <td style={{padding:"10px 14px",fontSize:12,fontFamily:T.mono,textAlign:"right"}}>{fnum(c.recipients)}</td>
              <td style={{padding:"10px 14px",textAlign:"right"}}><RatePill val={c.open_rate} type="open"/></td>
              <td style={{padding:"10px 14px",textAlign:"right"}}><RatePill val={c.click_rate} type="click"/></td>
              <td style={{padding:"10px 14px",fontSize:12,fontFamily:T.mono,textAlign:"right",
                color:c.unsubscribe_rate>0.002?T.red:T.sub}}>{pct(c.unsubscribe_rate)}</td>
              {hasRev&&<td style={{padding:"10px 14px",fontSize:13,fontWeight:600,fontFamily:T.mono,
                textAlign:"right",color:c.revenue?T.text:T.sub}}>{$m(c.revenue)}</td>}
              {hasRev&&<td style={{padding:"10px 14px",fontSize:12,fontFamily:T.mono,
                textAlign:"right",color:T.sub}}>{c.rpr!=null?`$${c.rpr.toFixed(2)}`:"—"}</td>}
              {hasRev&&<td style={{padding:"10px 14px",fontSize:12,fontFamily:T.mono,
                textAlign:"right"}}>{fnum(c.conversions)}</td>}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function FlowTable({flows,hasRev}) {
  const [col,setCol] = useState(hasRev?"revenue":"recipients");
  const [dir,setDir] = useState("desc");
  const onSort = c => { if(c===col)setDir(d=>d==="desc"?"asc":"desc"); else{setCol(c);setDir("desc");} };
  const rows = useMemo(()=>[...flows].sort((a,b)=>{
    const av=a[col],bv=b[col];
    if(av==null)return dir==="desc"?1:-1; if(bv==null)return dir==="desc"?-1:1;
    if(typeof av==="string")return dir==="desc"?bv.localeCompare(av):av.localeCompare(bv);
    return dir==="desc"?bv-av:av-bv;
  }),[flows,col,dir]);

  if (!flows.length) return (
    <div style={{padding:"40px",textAlign:"center",color:T.sub,fontSize:13}}>No flows found.</div>
  );
  return (
    <div style={{overflowX:"auto"}}>
      <table style={{width:"100%",borderCollapse:"collapse"}}>
        <thead><tr>
          <Th col="name"         cur={col} dir={dir} onSort={onSort}>Flow</Th>
          <Th col="trigger_type" cur={col} dir={dir} onSort={onSort}>Trigger</Th>
          <Th col="status"       cur={col} dir={dir} onSort={onSort}>Status</Th>
          <Th col="recipients"   cur={col} dir={dir} onSort={onSort} right>Recipients</Th>
          <Th col="open_rate"    cur={col} dir={dir} onSort={onSort} right>Open %</Th>
          <Th col="click_rate"   cur={col} dir={dir} onSort={onSort} right>Click %</Th>
          {hasRev&&<Th col="revenue"     cur={col} dir={dir} onSort={onSort} right>Revenue</Th>}
          {hasRev&&<Th col="rpr"         cur={col} dir={dir} onSort={onSort} right>RPR</Th>}
          {hasRev&&<Th col="conversions" cur={col} dir={dir} onSort={onSort} right>Convs</Th>}
        </tr></thead>
        <tbody>
          {rows.map((f,i)=>{
            const sc={live:[T.greenL,T.green],draft:["#F3F4F8",T.sub],manual:[T.orangeL,T.orange]};
            const [bg,fc]=sc[f.status]||["#F3F4F8",T.sub];
            return (
              <tr key={f.id} style={{borderBottom:`1px solid ${T.border}`,background:i%2===0?T.white:"#FBFBFE"}}>
                <td style={{padding:"10px 14px",maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",
                  whiteSpace:"nowrap",fontSize:13,fontWeight:500}} title={f.name}>{f.name}</td>
                <td style={{padding:"10px 14px"}}>
                  <span style={{fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:20,
                    background:T.blueL,color:T.blue}}>{f.trigger_type||"—"}</span>
                </td>
                <td style={{padding:"10px 14px"}}>
                  <span style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:12,fontWeight:500}}>
                    <span style={{width:6,height:6,borderRadius:"50%",background:fc}}/>
                    {f.status}
                  </span>
                </td>
                <td style={{padding:"10px 14px",fontSize:12,fontFamily:T.mono,textAlign:"right"}}>{fnum(f.recipients)}</td>
                <td style={{padding:"10px 14px",textAlign:"right"}}><RatePill val={f.open_rate} type="open"/></td>
                <td style={{padding:"10px 14px",textAlign:"right"}}><RatePill val={f.click_rate} type="click"/></td>
                {hasRev&&<td style={{padding:"10px 14px",fontSize:13,fontWeight:600,fontFamily:T.mono,
                  textAlign:"right",color:f.revenue?T.text:T.sub}}>{$m(f.revenue)}</td>}
                {hasRev&&<td style={{padding:"10px 14px",fontSize:12,fontFamily:T.mono,
                  textAlign:"right",color:T.sub}}>{f.rpr!=null?`$${f.rpr.toFixed(2)}`:"—"}</td>}
                {hasRev&&<td style={{padding:"10px 14px",fontSize:12,fontFamily:T.mono,
                  textAlign:"right"}}>{fnum(f.conversions)}</td>}
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

// ── Capacity charts ───────────────────────────────────────────────

function WeeklyCapacityChart({ weeks, personMap }) {
  const ref = useRef(null);
  const inst = useRef(null);
  const COLORS = { Enrique: T.purple, Jeremy: T.blue, Mariana: T.green };

  useEffect(() => {
    if (!ref.current || !weeks?.length) return;
    if (inst.current) { inst.current.destroy(); inst.current = null; }

    const people = Object.keys(personMap).filter(p => p !== "Unknown");
    const datasets = people.map(name => ({
      label: name,
      data: weeks.map(w => +((personMap[name]?.byWeek[w.key] || 0).toFixed(1))),
      backgroundColor: (COLORS[name] || T.sub) + "CC",
      borderRadius: 4,
      borderSkipped: false,
      barPercentage: 0.7,
    }));

    datasets.push({
      label: "40h capacity",
      data: weeks.map(() => 40),
      type: "line",
      borderColor: T.red + "70",
      borderDash: [5, 4],
      borderWidth: 1.5,
      pointRadius: 0,
      fill: false,
      order: 0,
    });

    inst.current = new window.Chart(ref.current.getContext("2d"), {
      type: "bar",
      data: { labels: weeks.map(w => w.label), datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: T.text,
            padding: 10,
            titleFont: { family: "DM Sans", size: 11 },
            bodyFont: { family: "DM Mono", size: 13 },
            callbacks: { label: c => ` ${c.dataset.label}: ${c.raw}h` }
          }
        },
        scales: {
          x: { grid: { display: false }, border: { display: false }, ticks: { color: T.sub, font: { size: 11 } } },
          y: { max: 50, beginAtZero: true, grid: { color: "rgba(0,0,0,0.04)" }, border: { display: false }, ticks: { callback: v => v + "h", color: T.sub, font: { size: 11 } } }
        }
      }
    });

    return () => { if (inst.current) { inst.current.destroy(); inst.current = null; } };
  }, [weeks, personMap]);

  return <div style={{ position: "relative", height: 240 }}><canvas ref={ref} /></div>;
}

function ClientHoursChart({ clientMap }) {
  const ref = useRef(null);
  const inst = useRef(null);

  useEffect(() => {
    if (!ref.current) return;
    if (inst.current) { inst.current.destroy(); inst.current = null; }

    const sorted = Object.entries(clientMap).sort((a, b) => b[1] - a[1]);
    const labels = sorted.map(([k]) => k === "Insendra" ? "Internal" : k);
    const values = sorted.map(([, v]) => +v.toFixed(1));

    inst.current = new window.Chart(ref.current.getContext("2d"), {
      type: "bar",
      data: {
        labels,
        datasets: [{
          data: values,
          backgroundColor: sorted.map(([k]) => k === "Insendra" ? T.sub + "88" : T.purple + "CC"),
          borderRadius: 4,
          barPercentage: 0.65,
        }]
      },
      options: {
        indexAxis: "y",
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { backgroundColor: T.text, padding: 10, callbacks: { label: c => ` ${c.raw.toFixed(1)}h` } }
        },
        scales: {
          x: { grid: { color: "rgba(0,0,0,0.04)" }, border: { display: false }, ticks: { callback: v => v + "h", color: T.sub, font: { size: 11 } } },
          y: { grid: { display: false }, border: { display: false }, ticks: { color: T.sub, font: { size: 12 } } }
        }
      }
    });

    return () => { if (inst.current) { inst.current.destroy(); inst.current = null; } };
  }, [clientMap]);

  const h = Math.max(200, Object.keys(clientMap).length * 44 + 60);
  return <div style={{ position: "relative", height: h }}><canvas ref={ref} /></div>;
}

// ── Capacity view ─────────────────────────────────────────────────

function CapacityView({ onBack }) {
  const [weeks, setWeeks] = useState(8);
  const [data, setData]   = useState(null);
  const [loading, setLoading] = useState(true);
  const [err, setErr]     = useState(null);
  const [capIns, setCapIns] = useState(null);
  const [capInsLoad, setCapInsLoad] = useState(false);

  useEffect(() => {
    setLoading(true); setErr(null); setData(null);
    fetch(`${PROXY}/harvest-data?weeks=${weeks}`)
      .then(r => r.json().then(j => ({ ok: r.ok, j })))
      .then(({ ok, j }) => { if (!ok) throw new Error(j.error); setData(j); })
      .catch(e => setErr(e.message))
      .finally(() => setLoading(false));
  }, [weeks]);

  const computed = useMemo(() => {
    if (!data?.entries?.length) return null;
    const entries = data.entries;

    const weekKey = ds => {
      const d = new Date(ds + "T12:00:00");
      const off = d.getDay() === 0 ? -6 : 1 - d.getDay();
      return new Date(d.getTime() + off * 86400000).toISOString().slice(0, 10);
    };
    const fmtWk = ds =>
      new Date(ds + "T12:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" });

    const allWeeks = [...new Set(entries.map(e => weekKey(e.spent_date)))].sort();
    const weekObjs = allWeeks.map(k => ({ key: k, label: fmtWk(k) }));

    const personMap = {};
    for (const e of entries) {
      const fn = (e.user?.name || "Unknown").split(" ")[0];
      if (!personMap[fn]) personMap[fn] = { total: 0, byWeek: {} };
      personMap[fn].total += e.hours;
      const wk = weekKey(e.spent_date);
      personMap[fn].byWeek[wk] = (personMap[fn].byWeek[wk] || 0) + e.hours;
    }

    const clientMap = {};
    const taskMap   = {};
    for (const e of entries) {
      if (!e.user?.name?.startsWith("Enrique")) continue;
      const c = e.client?.name || "Unknown";
      clientMap[c] = (clientMap[c] || 0) + e.hours;
      const t = e.task?.name || "Unknown";
      taskMap[t] = (taskMap[t] || 0) + e.hours;
    }

    const enTotal  = personMap["Enrique"]?.total || 0;
    const enAvg    = enTotal / (allWeeks.length || 1);
    const taskTotal = Object.values(taskMap).reduce((s, v) => s + v, 0);
    const emailDesignPct = taskTotal > 0 ? (taskMap["Email Design"] || 0) / taskTotal : 0;
    const amTotal  = (personMap["Jeremy"]?.total || 0) + (personMap["Mariana"]?.total || 0);

    return {
      weekObjs, personMap, clientMap, taskMap, taskTotal, emailDesignPct,
      enTotal: Math.round(enTotal * 10) / 10,
      enAvg:   Math.round(enAvg * 10) / 10,
      amTotal: Math.round(amTotal * 10) / 10,
    };
  }, [data]);

  async function loadCapacityInsights() {
    if (!computed) return;
    setCapInsLoad(true);
    setCapIns(null);
    try {
      const { personMap, clientMap, taskMap, enAvg, weekObjs } = computed;
      const personSummary = Object.entries(personMap)
        .map(([n, d]) => `${n}: ${d.total.toFixed(1)}h total, ${(d.total / (weekObjs.length || 1)).toFixed(1)}h/wk avg`)
        .join("; ");
      const clientSummary = Object.entries(clientMap).sort((a,b) => b[1]-a[1])
        .map(([c,h]) => `${c}: ${h.toFixed(1)}h`).join("; ");
      const taskSummary = Object.entries(taskMap).sort((a,b) => b[1]-a[1])
        .map(([t,h]) => `${t}: ${h.toFixed(1)}h`).join("; ");

      const prompt = `You are analyzing ${weeks}-week capacity data for a small email marketing agency (Insendra).

TEAM HOURS (last ${weeks} weeks):
${personSummary}

ENRIQUE (production) CLIENT BREAKDOWN:
${clientSummary}

ENRIQUE TASK TYPES:
${taskSummary}

Context: Enrique is the only full-time production designer. Target: ~40h/wk. He logs ${enAvg.toFixed(1)}h/wk on average — but likely under-logs, so actual utilization is higher. Mariana is a new account manager ramping up. Jeremy is the founder logging sporadically.

The team wants to know: Is Enrique approaching capacity? Should they hire a second designer? Which clients are heaviest on production?

Return exactly 4 insights as a JSON array (no markdown, no backticks):
[{"type":"good"|"warn"|"info","emoji":"<single emoji>","title":"<8 words max>","body":"<2 sentences with specific numbers and a concrete recommendation>"}]`;

      const r = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 800,
          system: "Return ONLY valid JSON arrays. No markdown. No prose.",
          messages: [{ role: "user", content: prompt }]
        })
      });
      const d = await r.json();
      const raw = (d.content || []).filter(b => b.type === "text").map(b => b.text).join("");
      setCapIns(JSON.parse(raw.replace(/```json\s*/g,"").replace(/```\s*/g,"").trim()));
    } catch(e) {
      console.error("Capacity insights error:", e);
    } finally {
      setCapInsLoad(false);
    }
  }

  const RANGE_OPTS = [{ label: "4 weeks", val: 4 }, { label: "8 weeks", val: 8 }, { label: "12 weeks", val: 12 }];
  const PERSON_COLORS = { Enrique: T.purple, Jeremy: T.blue, Mariana: T.green };

  return (
    <div style={{ minHeight: "100vh", background: T.bg, fontFamily: "'DM Sans',sans-serif" }}>
      {/* Header */}
      <div style={{ background: T.white, borderBottom: `1px solid ${T.border}`, height: 54,
        display: "flex", alignItems: "center", justifyContent: "space-between",
        padding: "0 26px", position: "sticky", top: 0, zIndex: 30 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ width: 28, height: 28, borderRadius: 7,
            background: "linear-gradient(135deg,#6D4DF4,#00C9B1)",
            display: "flex", alignItems: "center", justifyContent: "center" }}>
            <span style={{ color: "#fff", fontSize: 14, fontWeight: 700, fontFamily: "DM Mono" }}>i</span>
          </div>
          <span style={{ fontWeight: 700, fontSize: 14, letterSpacing: "-0.02em" }}>insendra</span>
          <span style={{ width: 1, height: 15, background: T.border, margin: "0 6px" }} />
          <span style={{ fontSize: 12, color: T.sub }}>Team Capacity</span>
        </div>
        <button onClick={onBack}
          style={{ background: "none", border: `1px solid ${T.border}`, color: T.sub,
            borderRadius: 8, padding: "5px 14px", cursor: "pointer", fontSize: 12,
            fontWeight: 500, fontFamily: "'DM Sans',sans-serif" }}>
          ← Client Intelligence
        </button>
      </div>

      <div style={{ padding: "22px 26px", maxWidth: 1300, margin: "0 auto" }}>
        {/* Title + range selector */}
        <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", marginBottom: 16 }}>
          <div>
            <div style={{ fontSize: 20, fontWeight: 700, letterSpacing: "-0.02em", marginBottom: 2 }}>
              Team Capacity
            </div>
            <div style={{ fontSize: 12, color: T.sub }}>
              Harvest time data{data ? ` · ${data.from} → ${data.to} · ${data.count} entries` : ""}
            </div>
          </div>
          <div style={{ display: "flex", gap: 4 }}>
            {RANGE_OPTS.map(o => (
              <button key={o.val} onClick={() => setWeeks(o.val)}
                style={{ padding: "5px 14px",
                  border: `1px solid ${weeks === o.val ? T.purple : T.border}`,
                  background: weeks === o.val ? T.purpleL : T.white,
                  color: weeks === o.val ? T.purple : T.sub,
                  borderRadius: 8, cursor: "pointer", fontSize: 12,
                  fontWeight: weeks === o.val ? 600 : 400,
                  fontFamily: "'DM Sans',sans-serif" }}>
                {o.label}
              </button>
            ))}
          </div>
        </div>

        {/* Loading */}
        {loading && (
          <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "48px 0", color: T.sub, fontSize: 13 }}>
            <Spin s={20} /> Loading Harvest data…
          </div>
        )}

        {/* Error */}
        {!loading && err && (
          <Card style={{ padding: "22px 24px", marginBottom: 14 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: T.red, marginBottom: 8 }}>
              {err.includes("not configured") ? "Harvest credentials not configured" : "Could not load Harvest data"}
            </div>
            <div style={{ fontSize: 12, color: T.sub, lineHeight: 1.8 }}>
              {err.includes("not configured")
                ? <>Add <code style={{background:"#F0F1F7",padding:"1px 5px",borderRadius:4,fontFamily:T.mono}}>HARVEST_TOKEN</code> and <code style={{background:"#F0F1F7",padding:"1px 5px",borderRadius:4,fontFamily:T.mono}}>HARVEST_ACCOUNT_ID</code> to your Render environment variables. Generate a personal access token at <strong>id.getharvest.com</strong>.</>
                : err}
            </div>
          </Card>
        )}

        {/* Data views */}
        {!loading && !err && computed && (
          <>
            {/* Summary cards */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(165px,1fr))", gap: 10, marginBottom: 14 }}>
              {[
                { label: "Enrique — total hours", val: computed.enTotal + "h", sub: `over ${weeks} weeks` },
                { label: "Weekly avg (Enrique)",  val: computed.enAvg + "h",
                  c: computed.enAvg >= 38 ? T.red : computed.enAvg >= 28 ? T.orange : T.sub,
                  sub: "vs 40h/wk capacity" },
                { label: "AM hours logged",        val: computed.amTotal + "h", sub: "Jeremy + Mariana" },
                { label: "Weeks in range",         val: String(computed.weekObjs.length), sub: `${data.count} time entries` },
              ].map((s, i) => (
                <Card key={i} style={{ padding: "16px 18px" }}>
                  <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: "0.12em",
                    textTransform: "uppercase", color: T.sub, marginBottom: 9 }}>{s.label}</div>
                  <div style={{ fontSize: 22, fontWeight: 700, color: s.c || T.text,
                    lineHeight: 1, fontFamily: T.mono, marginBottom: 5 }}>{s.val}</div>
                  <div style={{ fontSize: 10, color: T.sub }}>{s.sub}</div>
                </Card>
              ))}
            </div>

            {/* Under-logging notice */}
            {computed.enAvg < 32 && (
              <div style={{ display: "flex", gap: 12, padding: "12px 16px",
                background: T.orangeL, border: `1px solid #FDE68A`,
                borderRadius: 10, marginBottom: 14, fontSize: 12, color: "#92400E", lineHeight: 1.7 }}>
                <span style={{ flexShrink: 0 }}>⚠</span>
                <span>Enrique is averaging <strong>{computed.enAvg}h/wk</strong> logged — well below a 40h work week, suggesting under-logging rather than excess capacity. Encourage consistent daily time tracking before using these numbers to make hiring decisions.</span>
              </div>
            )}

            {/* Weekly capacity chart */}
            <Card style={{ marginBottom: 14 }}>
              <SectionHead
                title="Weekly hours"
                sub="By team member · dashed line = 40h capacity target"
                right={
                  <div style={{ display: "flex", gap: 14 }}>
                    {Object.entries(PERSON_COLORS).map(([name, color]) =>
                      computed.personMap[name] ? (
                        <span key={name} style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 11, color: T.sub }}>
                          <span style={{ width: 10, height: 10, borderRadius: 2, background: color }} />
                          {name} · {computed.personMap[name].total.toFixed(1)}h
                        </span>
                      ) : null
                    )}
                  </div>
                }
              />
              <div style={{ padding: "16px 20px 20px" }}>
                <WeeklyCapacityChart weeks={computed.weekObjs} personMap={computed.personMap} />
              </div>
            </Card>

            {/* Client hours + task breakdown */}
            <div style={{ display: "grid", gridTemplateColumns: "minmax(0,1fr) minmax(0,1fr)", gap: 14, marginBottom: 14 }}>
              <Card>
                <SectionHead title="Hours by client" sub="Enrique only · production time" />
                <div style={{ padding: "16px 20px 20px" }}>
                  <ClientHoursChart clientMap={computed.clientMap} />
                </div>
              </Card>

              <Card>
                <SectionHead title="Task type breakdown" sub="Enrique only · logging health" />
                <div>
                  {computed.emailDesignPct > 0.75 && (
                    <div style={{ margin: "12px 16px 0", padding: "9px 12px",
                      background: T.orangeL, borderRadius: 8, fontSize: 11,
                      color: "#92400E", lineHeight: 1.6 }}>
                      "Email Design" = <strong>{Math.round(computed.emailDesignPct * 100)}%</strong> of hours — too broad for task benchmarks. Consider splitting into: Campaign Email, Flow Email, Sign-Up Form, Revisions, QA.
                    </div>
                  )}
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                    <thead>
                      <tr>
                        {["Task", "Hours", "%"].map((h, i) => (
                          <th key={h} style={{ padding: "8px 16px",
                            textAlign: i > 0 ? "right" : "left",
                            fontSize: 10, fontWeight: 700, letterSpacing: "0.08em",
                            textTransform: "uppercase", color: T.sub,
                            borderBottom: `1px solid ${T.border}`, background: "#FAFAFD" }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {Object.entries(computed.taskMap).sort((a,b) => b[1]-a[1]).map(([task, hrs], i) => {
                        const p = computed.taskTotal > 0 ? hrs / computed.taskTotal : 0;
                        return (
                          <tr key={task} style={{ borderBottom: `1px solid ${T.border}`, background: i%2===0?T.white:"#FBFBFE" }}>
                            <td style={{ padding: "9px 16px", fontWeight: 500 }}>{task}</td>
                            <td style={{ padding: "9px 16px", textAlign: "right", fontFamily: T.mono }}>{hrs.toFixed(1)}h</td>
                            <td style={{ padding: "9px 16px", textAlign: "right" }}>
                              <span style={{ fontSize: 11, fontWeight: 600, padding: "2px 7px",
                                borderRadius: 6, fontFamily: T.mono,
                                background: p > 0.7 ? T.orangeL : T.purpleL,
                                color: p > 0.7 ? "#92400E" : T.purple }}>
                                {Math.round(p * 100)}%
                              </span>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </Card>
            </div>

            {/* AI capacity insights */}
            <Card style={{ marginBottom: 28 }}>
              <SectionHead
                title="✦ AI Capacity Analysis"
                sub="Hiring signal and capacity recommendations"
                right={
                  <button onClick={loadCapacityInsights} disabled={capInsLoad}
                    style={{ display: "flex", alignItems: "center", gap: 6, background: "none",
                      border: `1px solid ${T.border}`, borderRadius: 8, padding: "5px 12px",
                      cursor: capInsLoad ? "not-allowed" : "pointer", fontSize: 11, color: T.sub,
                      fontFamily: "'DM Sans',sans-serif", fontWeight: 500 }}>
                    {capInsLoad ? <><Spin s={12}/> Analyzing…</> : capIns ? "↻ Refresh" : "Analyze ✦"}
                  </button>
                }
              />
              {capInsLoad ? (
                <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "20px", color: T.sub, fontSize: 13 }}>
                  <Spin s={16} /> Analyzing capacity data…
                </div>
              ) : capIns ? (
                <div style={{ padding: "10px 16px" }}>
                  {capIns.map((ins, i) => {
                    const bg = { good: T.greenL, warn: T.orangeL, info: T.blueL }[ins.type] || T.blueL;
                    return (
                      <div key={i} style={{ display: "flex", gap: 14, padding: "12px 4px",
                        borderBottom: i < capIns.length - 1 ? `1px solid ${T.border}` : "none" }}>
                        <div style={{ width: 36, height: 36, borderRadius: 10, flexShrink: 0,
                          background: bg, display: "flex", alignItems: "center",
                          justifyContent: "center", fontSize: "1.05rem" }}>{ins.emoji}</div>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 4 }}>{ins.title}</div>
                          <div style={{ fontSize: 12, color: T.sub, lineHeight: 1.7 }}>{ins.body}</div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              ) : (
                <div style={{ padding: "24px", textAlign: "center", fontSize: 13, color: T.sub }}>
                  Click "Analyze ✦" to get AI-powered hiring signal and capacity insights.
                </div>
              )}
            </Card>
          </>
        )}

        {!loading && !err && !computed && data && (
          <Card style={{ padding: "32px 24px", textAlign: "center" }}>
            <div style={{ fontSize: 13, color: T.sub }}>No time entries found for this period.</div>
          </Card>
        )}
      </div>
    </div>
  );
}

            <div style={{fontSize:13,fontWeight:600}}>{clientLabel||kData.account?.name||"Account"}</div>

              {[kData.account?.timezone,kData.account?.currency].filter(Boolean).join(" · ")||"Klaviyo Account"}
            </div>

          <button onClick={onCapacity}
            style={{background:"none",border:`1px solid ${T.border}`,color:T.sub,
              borderRadius:8,padding:"5px 14px",cursor:"pointer",fontSize:12,
              fontWeight:500,fontFamily:"'DM Sans',sans-serif"}}>
            Team Capacity
          </button>
          <button onClick={onOut}
            style={{background:"none",border:`1px solid ${T.border}`,color:T.sub,
              borderRadius:8,padding:"5px 14px",cursor:"pointer",fontSize:12,
              fontWeight:500,fontFamily:"'DM Sans',sans-serif"}}>
            Sign out
          </button>
        </div>
      </div>

      <div style={{padding:"22px 26px",maxWidth:1300,margin:"0 auto"}}>
        <div style={{marginBottom:16}}>
          <div style={{fontSize:20,fontWeight:700,letterSpacing:"-0.02em",marginBottom:2}}>
            Performance Overview
          </div>
          <div style={{fontSize:12,color:T.sub}}>Last 12 months · Email marketing intelligence</div>
        </div>

        {/* Stats */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(165px,1fr))",
          gap:10,marginBottom:14}}>
          {stats.map((s,i)=>(
            <Card key={i} style={{padding:"16px 18px"}}>
              <div style={{fontSize:9,fontWeight:700,letterSpacing:"0.12em",
                textTransform:"uppercase",color:T.sub,marginBottom:9}}>{s.label}</div>
              <div style={{fontSize:s.big?26:22,fontWeight:700,color:s.c||T.text,
                lineHeight:1,fontFamily:T.mono,marginBottom:5}}>{s.val}</div>
              <div style={{fontSize:10,color:T.sub}}>{s.sub}</div>
            </Card>
          ))}
        </div>

        {/* Revenue chart */}
        {hasRev&&(
          <Card style={{marginBottom:14}}>
            <SectionHead title="Revenue Over Time" sub="Email-attributed · last 12 months"/>
            <div style={{padding:"16px 20px 20px"}}>
              <RevenueChart monthly={kData.monthly||[]}/>
            </div>
          </Card>
        )}

        {/* Campaigns */}
        <Card style={{marginBottom:14}}>
          <SectionHead
            title="Campaign Performance"
            sub={`${camps.length} campaigns · click headers to sort`}
            right={hasRev&&cRev>0&&(
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:11,color:T.sub}}>Campaign revenue</div>
                <div style={{fontSize:16,fontWeight:700,color:T.purple,fontFamily:T.mono}}>{$m(cRev)}</div>
              </div>
            )}
          />
          <CampaignTable campaigns={camps} hasRev={hasRev} debug={kData._debug}/>
        </Card>

        {/* Flows */}
        <Card style={{marginBottom:14}}>
          <SectionHead
            title="Automated Flows"
            sub={`${flows.length} flows · click headers to sort`}
            right={hasRev&&fRev>0&&(
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:11,color:T.sub}}>Flow revenue</div>
                <div style={{fontSize:16,fontWeight:700,color:T.green,fontFamily:T.mono}}>{$m(fRev)}</div>
              </div>
            )}
          />
          <FlowTable flows={flows} hasRev={hasRev}/>
        </Card>

        {/* AI insights */}
        <Card style={{marginBottom:28}}>
          <SectionHead
            title="✦ AI Recommendations"
            sub="Revenue-focused Claude analysis"
            right={
              <button onClick={onRefresh} disabled={insLoad}
                style={{display:"flex",alignItems:"center",gap:6,background:"none",
                  border:`1px solid ${T.border}`,borderRadius:8,padding:"5px 12px",
                  cursor:insLoad?"not-allowed":"pointer",fontSize:11,color:T.sub,
                  fontFamily:"'DM Sans',sans-serif",fontWeight:500}}>
                {insLoad?<><Spin s={12}/> Analyzing…</>:"↻ Refresh"}
              </button>
            }
          />
          {insLoad?(
            <div style={{display:"flex",alignItems:"center",gap:10,padding:"20px",color:T.sub,fontSize:13}}>
              <Spin s={16}/> Analyzing your account data…
            </div>
          ):insights?(
            <div style={{padding:"10px 16px"}}>
              {insights.map((ins,i)=>{
                const bg={good:T.greenL,warn:T.orangeL,info:T.blueL}[ins.type]||T.blueL;
                return (
                  <div key={i} style={{display:"flex",gap:14,padding:"12px 4px",
                    borderBottom:i<insights.length-1?`1px solid ${T.border}`:"none"}}>
                    <div style={{width:36,height:36,borderRadius:10,flexShrink:0,
                      background:bg,display:"flex",alignItems:"center",
                      justifyContent:"center",fontSize:"1.05rem"}}>{ins.emoji}</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:600,marginBottom:4}}>{ins.title}</div>
                      <div style={{fontSize:12,color:T.sub,lineHeight:1.7}}>{ins.body}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          ):(
            <div style={{padding:"20px",textAlign:"center",fontSize:13,color:T.sub}}>
              Could not load insights.{" "}
              <button onClick={onRefresh} style={{background:"none",border:"none",color:T.purple,
                cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:13,textDecoration:"underline"}}>
                Try again
              </button>
            </div>
          )}
        </Card>
      </div>
    </div>
  );
}

// ── App root ──────────────────────────────────────────────────────

function App() {
  const [view,   setView]  = useState(() => new URLSearchParams(window.location.search).get("view") === "capacity" ? "capacity" : "intelligence");
  const [phase,  setPhase] = useState("login");
  const [msg,    setMsg]   = useState("");
  const [err,    setErr]   = useState("");
  const [kData,  setKData] = useState(null);
  const [ins,    setIns]   = useState(null);
  const [insLoad,setIL]    = useState(false);
  const [label,  setLabel] = useState("");

  const connect = useCallback(async(key,clientLabel)=>{
    setErr(""); setLabel(clientLabel); setPhase("loading"); setMsg("Fetching Klaviyo data…");
    try {
      const data = await loadKlaviyoData(key);
      setKData(data);
      setMsg("Generating AI insights…");
      setIL(true);
      setIns(await loadInsights(data).catch(()=>null));
      setIL(false);
      setPhase("dashboard");
    } catch(e) {
      setPhase("login");
      setErr(e.message?.match(/401|403|Invalid/i)
        ?"Invalid API key — ensure it's a Private API Key with full access"
        :e.message||"Unexpected error");
    }
  },[]);

  const signOut    = () => { setPhase("login");setKData(null);setIns(null);setLabel("");setErr("");setIL(false); };
  const refresh    = useCallback(async()=>{ if(!kData) return; setIL(true); setIns(await loadInsights(kData).catch(()=>null)); setIL(false); },[kData]);
  const toCapacity = () => setView("capacity");
  const toIntel    = () => setView("intelligence");

  if (view === "capacity") return <CapacityView onBack={toIntel} />;

  if (phase === "login")     return <Login onConnect={connect} err={err} loading={false} onCapacity={toCapacity}/>;
  if (phase === "loading")   return <Loading msg={msg}/>;
  if (phase === "dashboard") return <Dashboard kData={kData} insights={ins} insLoad={insLoad}
    onRefresh={refresh} clientLabel={label} onOut={signOut} onCapacity={toCapacity}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
