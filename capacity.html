<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Insendra — Team Capacity</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%236D4DF4'/><text x='16' y='22' text-anchor='middle' font-family='sans-serif' font-size='18' font-weight='700' fill='white'>i</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#F5F4FA;color:#1A1025;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#DDDDE8;border-radius:2px;}
table{border-spacing:0;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;
const PROXY = window.location.origin;

// ── Design tokens ─────────────────────────────────────────────────
const T = {
  purple:"#6D4DF4", purpleL:"#EEE9FF", purpleMid:"#917FDD",
  green:"#15D197",  greenL:"#EDFDF7",
  red:"#F04E55",    redL:"#FEEAEB",
  orange:"#F59E0B", orangeL:"#FEF3C7",
  blue:"#3B82F6",   blueL:"#DBEAFE",
  cyan:"#17D3DD",   cyanL:"#EDFBFC",
  text:"#1A1025", mid:"#5C5475", sub:"#9C93B8",
  white:"#FFFFFF", bg:"#F5F4FA", border:"#EBEBF0",
  mono:"'JetBrains Mono',monospace",
  sans:"'Plus Jakarta Sans',sans-serif",
};

// ── Constants ─────────────────────────────────────────────────────
const BILLABLE_TARGET   = 30;   // 6h/day × 5 days
const TOTAL_TARGET      = 40;   // full work week
const HIRE_THRESHOLD    = 0.85; // 85% of billable target = hiring watch
const HIRE_CONSECUTIVE  = 3;    // weeks above threshold = hire signal

// Client MRR for revenue-per-hour calc (from /api/insendra-data)
const CLIENT_MRR = {
  "CablesAndKits": 1900, "Chandler 4 Corners": 1980,
  "Bae & Friends": 2961, "Eli Health": 5000,
  "Safety Gear": 4824,   "Fore & Wharf": 1941,
};
const TOTAL_MRR = Object.values(CLIENT_MRR).reduce((s,v)=>s+v,0);

// ── Helpers ───────────────────────────────────────────────────────
const fh  = h => h == null ? "—" : h.toFixed(1) + "h";
const fpct = n => n == null ? "—" : Math.round(n * 100) + "%";
const $m  = n => n >= 1000 ? `$${(n/1000).toFixed(1)}K` : `$${Math.round(n)}`;
const fmtWk = ds => new Date(ds + "T12:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" });

function weekKey(ds) {
  const d = new Date(ds + "T12:00:00");
  const off = d.getDay() === 0 ? -6 : 1 - d.getDay();
  return new Date(d.getTime() + off * 86400000).toISOString().slice(0, 10);
}

function utilizationColor(rate) {
  if (rate == null) return T.sub;
  if (rate >= 1.0)  return T.red;
  if (rate >= 0.85) return T.orange;
  if (rate >= 0.6)  return T.green;
  return T.blue;
}

// ── Shared components ─────────────────────────────────────────────
const Spin = ({s=20,c=T.purple}) => (
  <span style={{display:"inline-block",width:s,height:s,
    border:`2px solid ${c}22`,borderTopColor:c,
    borderRadius:"50%",animation:"spin .6s linear infinite"}}/>
);

const Card = ({children,style={}}) => (
  <div style={{background:T.white,border:`1px solid ${T.border}`,
    borderRadius:16,...style}}>{children}</div>
);

const SectionHead = ({title,sub,right,accent}) => (
  <div style={{padding:"16px 22px",borderBottom:`1px solid ${T.border}`,
    display:"flex",alignItems:"center",justifyContent:"space-between"}}>
    <div>
      <div style={{fontSize:13,fontWeight:700,color:T.text,
        display:"flex",alignItems:"center",gap:7}}>
        {accent && <span style={{color:accent}}>{accent === T.purple ? "✦" : ""}</span>}
        {title}
      </div>
      {sub && <div style={{fontSize:11,color:T.sub,marginTop:2}}>{sub}</div>}
    </div>
    {right}
  </div>
);

// ── Stat card ─────────────────────────────────────────────────────
function StatCard({ label, value, sub, color, big, tag, tagColor }) {
  return (
    <Card style={{padding:"18px 20px"}}>
      <div style={{fontSize:9,fontWeight:700,letterSpacing:"0.12em",
        textTransform:"uppercase",color:T.sub,marginBottom:10}}>{label}</div>
      <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:5}}>
        <div style={{fontSize:big?28:22,fontWeight:800,color:color||T.text,
          lineHeight:1,fontFamily:T.mono}}>{value}</div>
        {tag && (
          <span style={{fontSize:10,fontWeight:700,padding:"2px 7px",
            borderRadius:20,background:(tagColor||T.purple)+"18",
            color:tagColor||T.purple}}>{tag}</span>
        )}
      </div>
      {sub && <div style={{fontSize:10,color:T.sub,lineHeight:1.5}}>{sub}</div>}
    </Card>
  );
}

// ── Utilization bar ───────────────────────────────────────────────
function UtilBar({ rate, h, target }) {
  const c = utilizationColor(rate);
  const pct = Math.min(rate || 0, 1.15);
  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",
        alignItems:"baseline",marginBottom:5}}>
        <span style={{fontSize:12,fontWeight:600,color:c,fontFamily:T.mono}}>
          {fpct(rate)}
        </span>
        <span style={{fontSize:11,color:T.sub}}>{fh(h)} / {target}h target</span>
      </div>
      <div style={{height:6,background:T.border,borderRadius:99,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${pct*100}%`,
          background:c,borderRadius:99,
          transition:"width 0.4s ease"}}/>
      </div>
    </div>
  );
}

// ── Weekly chart ──────────────────────────────────────────────────
function WeeklyChart({ weekObjs, personMap, hireThresholdH }) {
  const ref  = useRef(null);
  const inst = useRef(null);
  const COLORS = { Enrique: T.purple, Jeremy: T.blue, Mariana: T.green };

  useEffect(() => {
    if (!ref.current || !weekObjs.length) return;
    if (inst.current) { inst.current.destroy(); inst.current = null; }

    const people = Object.keys(personMap).filter(p => COLORS[p]);
    const datasets = people.map(name => ({
      label: name,
      data: weekObjs.map(w => +((personMap[name]?.byWeek[w.key] || 0).toFixed(1))),
      backgroundColor: (COLORS[name]) + "CC",
      borderRadius: 5,
      borderSkipped: false,
      barPercentage: 0.68,
    }));

    // Billable target line
    datasets.push({
      label: "Billable target (30h)",
      data: weekObjs.map(() => BILLABLE_TARGET),
      type: "line", borderColor: T.green + "60",
      borderDash: [5, 4], borderWidth: 1.5,
      pointRadius: 0, fill: false, order: 0,
    });
    // Hire watch line
    datasets.push({
      label: "Hire watch (85%)",
      data: weekObjs.map(() => Math.round(BILLABLE_TARGET * HIRE_THRESHOLD)),
      type: "line", borderColor: T.orange + "70",
      borderDash: [3, 3], borderWidth: 1.5,
      pointRadius: 0, fill: false, order: 0,
    });

    inst.current = new window.Chart(ref.current.getContext("2d"), {
      type: "bar",
      data: { labels: weekObjs.map(w => w.label), datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: T.text, padding: 10,
            callbacks: { label: c => ` ${c.dataset.label}: ${c.raw}h` }
          }
        },
        scales: {
          x: { grid: { display: false }, border: { display: false },
            ticks: { color: T.sub, font: { size: 11, family: T.sans } } },
          y: { max: 45, beginAtZero: true,
            grid: { color: "rgba(0,0,0,0.04)" }, border: { display: false },
            ticks: { callback: v => v + "h", color: T.sub,
              font: { size: 11, family: T.mono } } }
        }
      }
    });
    return () => { if (inst.current) { inst.current.destroy(); inst.current = null; } };
  }, [weekObjs, personMap]);

  return <div style={{position:"relative",height:240}}><canvas ref={ref}/></div>;
}

// ── Client hours chart ────────────────────────────────────────────
function ClientChart({ clientByRole }) {
  const ref  = useRef(null);
  const inst = useRef(null);

  useEffect(() => {
    if (!ref.current) return;
    if (inst.current) { inst.current.destroy(); inst.current = null; }

    // Sort by total hours (design + strategy), exclude pure-internal with no client name
    const sorted = Object.entries(clientByRole)
      .map(([name, d]) => ({ name, design: d.design||0, strategy: d.strategy||0, total: (d.design||0)+(d.strategy||0) }))
      .filter(d => d.name !== "Unknown" && d.total > 0)
      .sort((a, b) => b.total - a.total);

    const labels = sorted.map(d => d.name === "Insendra" ? "Internal" : d.name);

    inst.current = new window.Chart(ref.current.getContext("2d"), {
      type: "bar",
      data: {
        labels,
        datasets: [
          {
            label: "Design",
            data: sorted.map(d => +d.design.toFixed(1)),
            backgroundColor: T.purple + "CC",
            borderRadius: 0,
            borderSkipped: false,
          },
          {
            label: "Strategy",
            data: sorted.map(d => +d.strategy.toFixed(1)),
            backgroundColor: T.blue + "CC",
            borderRadius: 4,
            borderSkipped: "bottom",
          },
          {
            label: "Copy (n/a)",
            data: sorted.map(() => 0),
            backgroundColor: T.green + "55",
            borderRadius: 4,
            borderSkipped: "bottom",
          },
        ]
      },
      options: {
        indexAxis: "y",
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            display: true,
            position: "top",
            align: "end",
            labels: {
              boxWidth: 10, boxHeight: 10, borderRadius: 2,
              font: { size: 11, family: "'Plus Jakarta Sans',sans-serif" },
              color: T.sub, padding: 16,
              filter: item => item.text !== "Copy (n/a)" || true,
            }
          },
          tooltip: {
            backgroundColor: T.text, padding: 10,
            callbacks: {
              label: c => c.dataset.label === "Copy (n/a)"
                ? " Copy: not tracked yet"
                : ` ${c.dataset.label}: ${c.raw.toFixed(1)}h`
            }
          }
        },
        scales: {
          x: {
            stacked: true,
            grid: { color: "rgba(0,0,0,0.04)" }, border: { display: false },
            ticks: { callback: v => v + "h", color: T.sub, font: { size: 11 } }
          },
          y: {
            stacked: true,
            grid: { display: false }, border: { display: false },
            ticks: { color: T.sub, font: { size: 12 } }
          }
        }
      }
    });
    return () => { if (inst.current) { inst.current.destroy(); inst.current = null; } };
  }, [clientByRole]);

  const h = Math.max(200, Object.keys(clientByRole).length * 44 + 80);
  return (
    <div>
      <div style={{position:"relative",height:h}}><canvas ref={ref}/></div>
      <div style={{display:"flex",alignItems:"center",gap:6,padding:"10px 4px 0",
        fontSize:11,color:T.sub}}>
        <span style={{width:8,height:8,borderRadius:2,background:T.green+"55",display:"inline-block"}}/>
        Copy tracking coming once task types are split in Harvest
      </div>
    </div>
  );
}

// ── Utilization trend sparkline ───────────────────────────────────
function TrendSparkline({ weekObjs, weeklyHours }) {
  const ref  = useRef(null);
  const inst = useRef(null);
  const rates = weekObjs.map(w => +((weeklyHours[w.key] || 0) / BILLABLE_TARGET).toFixed(2));

  useEffect(() => {
    if (!ref.current || !rates.length) return;
    if (inst.current) { inst.current.destroy(); inst.current = null; }
    const ctx  = ref.current.getContext("2d");
    const grad = ctx.createLinearGradient(0, 0, 0, 60);
    grad.addColorStop(0, T.purple + "20");
    grad.addColorStop(1, T.purple + "00");

    inst.current = new window.Chart(ctx, {
      type: "line",
      data: {
        labels: weekObjs.map(w => w.label),
        datasets: [{
          data: rates.map(r => +(r * 100).toFixed(0)),
          borderColor: T.purple, backgroundColor: grad,
          fill: true, tension: 0.4,
          pointRadius: 0, borderWidth: 2,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { enabled: false } },
        scales: { x: { display: false }, y: { display: false, min: 0, max: 130 } }
      }
    });
    return () => { if (inst.current) { inst.current.destroy(); inst.current = null; } };
  }, [rates.join(",")]);

  return <div style={{position:"relative",height:60}}><canvas ref={ref}/></div>;
}

// ── Hiring signal card ────────────────────────────────────────────
function HiringSignal({ weekObjs, weeklyHours }) {
  const rates = weekObjs.map(w => (weeklyHours[w.key] || 0) / BILLABLE_TARGET);
  const overThreshold = rates.filter(r => r >= HIRE_THRESHOLD).length;
  const lastN = rates.slice(-HIRE_CONSECUTIVE);
  const consecutiveOver = lastN.every(r => r >= HIRE_THRESHOLD);
  const avgRate = rates.length ? rates.reduce((s,r)=>s+r,0)/rates.length : 0;
  const trend = rates.length >= 2 ? rates[rates.length-1] - rates[0] : 0;

  let signal, signalColor, signalBg, signalIcon, signalMsg;
  if (consecutiveOver || overThreshold >= Math.max(3, rates.length * 0.6)) {
    signal = "HIRE NOW"; signalColor = T.red; signalBg = T.redL;
    signalIcon = "🚨";
    signalMsg = `Enrique has been at or above ${Math.round(HIRE_THRESHOLD*100)}% utilization for ${overThreshold} of ${rates.length} weeks. At current trajectory, production will become a bottleneck. Time to post a job.`;
  } else if (overThreshold >= 2 || avgRate >= 0.70) {
    signal = "WATCH"; signalColor = T.orange; signalBg = T.orangeL;
    signalIcon = "⚠️";
    signalMsg = `Enrique hit ${Math.round(HIRE_THRESHOLD*100)}%+ utilization ${overThreshold} time${overThreshold!==1?"s":""} in this window. Not critical yet — but worth thinking about a junior hire or contractor before the next growth push.`;
  } else if (avgRate >= 0.50) {
    signal = "HEALTHY"; signalColor = T.green; signalBg = T.greenL;
    signalIcon = "✅";
    signalMsg = `Production capacity is healthy with room to grow. Enrique is using ${fpct(avgRate)} of his available time — you can take on more client work without adding headcount. ${trend > 0.05 ? "Utilization is trending up — keep watching." : ""}`;
  } else {
    signal = "CAPACITY AVAILABLE"; signalColor = T.blue; signalBg = T.blueL;
    signalIcon = "📦";
    signalMsg = `Enrique is averaging ${fpct(avgRate)} of his 30h/wk target — there is meaningful unused production capacity. You could absorb ${Math.round((BILLABLE_TARGET - (avgRate * BILLABLE_TARGET)) * (weekObjs.length||1))}h of additional work in this period without any new hires. Consider whether this reflects light client load, scope, or an opportunity to grow accounts.`;
  }

  const trendLabel = trend > 0.08 ? "↑ Rising" : trend < -0.08 ? "↓ Falling" : "→ Steady";
  const trendColor = trend > 0.08 ? T.red : trend < -0.08 ? T.green : T.sub;

  return (
    <Card style={{marginBottom:14,border:`1.5px solid ${signalColor}33`,overflow:"hidden"}}>
      <div style={{display:"flex",alignItems:"stretch"}}>
        {/* Signal badge */}
        <div style={{width:160,flexShrink:0,background:signalBg,
          display:"flex",flexDirection:"column",alignItems:"center",
          justifyContent:"center",padding:"20px 16px",gap:8,
          borderRight:`1px solid ${T.border}`}}>
          <div style={{fontSize:28}}>{signalIcon}</div>
          <div style={{fontSize:11,fontWeight:800,letterSpacing:"0.1em",
            textTransform:"uppercase",color:signalColor,textAlign:"center",
            fontFamily:T.mono}}>{signal}</div>
        </div>
        {/* Signal content */}
        <div style={{flex:1,padding:"20px 22px"}}>
          <div style={{fontSize:13,fontWeight:700,color:T.text,marginBottom:8}}>
            Hiring Signal
          </div>
          <div style={{fontSize:12,color:T.mid,lineHeight:1.8,marginBottom:14}}>
            {signalMsg}
          </div>
          <div style={{display:"flex",gap:24}}>
            {[
              { label:"Avg utilization", val: fpct(avgRate), c: utilizationColor(avgRate) },
              { label:"Weeks above 85%", val: `${overThreshold} / ${rates.length}`, c: overThreshold>=2?T.orange:T.sub },
              { label:"Trend", val: trendLabel, c: trendColor },
            ].map(s => (
              <div key={s.label}>
                <div style={{fontSize:9,fontWeight:700,letterSpacing:"0.1em",
                  textTransform:"uppercase",color:T.sub,marginBottom:4}}>{s.label}</div>
                <div style={{fontSize:14,fontWeight:700,fontFamily:T.mono,color:s.c}}>{s.val}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </Card>
  );
}

// ── Revenue per hour card ─────────────────────────────────────────
function RevenuePerHour({ clientMap, weekCount }) {
  const totalClientH = Object.entries(clientMap)
    .filter(([k]) => k !== "Insendra")
    .reduce((s,[,v])=>s+v,0);
  const monthlyH   = weekCount > 0 ? totalClientH / weekCount * 4.33 : null;
  const rph        = totalClientH > 0 ? TOTAL_MRR / (totalClientH / (weekCount / 4.33)) : null;
  const billablePct = totalClientH > 0
    ? totalClientH / Object.values(clientMap).reduce((s,v)=>s+v,0) : null;

  // Top client by hours and its share of MRR
  const topClient = Object.entries(clientMap)
    .filter(([k])=>k!=="Insendra")
    .sort((a,b)=>b[1]-a[1])[0];
  const topConcentration = topClient && totalClientH > 0
    ? topClient[1] / totalClientH : null;
  const topMRR = topClient ? CLIENT_MRR[topClient[0]] || 0 : 0;
  const topRevShare = topMRR / TOTAL_MRR;

  return (
    <Card style={{marginBottom:14}}>
      <SectionHead title="Business Context" sub="Revenue lens on production hours"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:0}}>
        {[
          {
            label: "Revenue per production hour",
            val: rph ? `$${Math.round(rph)}` : "—",
            sub: `${$m(TOTAL_MRR)}/mo MRR ÷ Enrique's billable hours`,
            c: T.purple, big: true,
          },
          {
            label: "Billable vs internal split",
            val: fpct(billablePct),
            sub: `${fh(totalClientH)} client · ${fh(Object.values(clientMap).reduce((s,v)=>s+v,0)-totalClientH)} internal`,
            c: billablePct && billablePct >= 0.75 ? T.green : T.orange,
          },
          {
            label: "Top client concentration",
            val: topClient ? `${Math.round((topConcentration||0)*100)}%` : "—",
            sub: topClient ? `${topClient[0]} · ${fh(topClient[1])} · ${$m(topMRR)}/mo` : "",
            c: topConcentration && topConcentration >= 0.30 ? T.orange : T.sub,
          },
        ].map((s,i) => (
          <div key={i} style={{padding:"18px 22px",
            borderRight:i<2?`1px solid ${T.border}`:"none"}}>
            <div style={{fontSize:9,fontWeight:700,letterSpacing:"0.12em",
              textTransform:"uppercase",color:T.sub,marginBottom:9}}>{s.label}</div>
            <div style={{fontSize:s.big?26:22,fontWeight:800,
              color:s.c||T.text,lineHeight:1,fontFamily:T.mono,marginBottom:5}}>{s.val}</div>
            <div style={{fontSize:10,color:T.sub,lineHeight:1.5}}>{s.sub}</div>
          </div>
        ))}
      </div>
    </Card>
  );
}

// ── Cost per task breakdown ───────────────────────────────────────
function CostBreakdown({ tasksByPerson, taskTot, weekCount }) {
  const [expanded, setExpanded] = useState({});
  const toggle = key => setExpanded(e => ({ ...e, [key]: !e[key] }));

  const PERSON_ORDER  = ["Enrique", "Jeremy", "Mariana"];
  const PERSON_COLORS = { Enrique: T.purple, Jeremy: T.blue, Mariana: T.green };
  const PERSON_ROLES  = { Enrique: "Production", Jeremy: "Founder / AM", Mariana: "Account Manager" };
  const SALARIES      = { Enrique: 2000, Jeremy: 3500, Mariana: 2500 };

  const people = PERSON_ORDER.filter(n => tasksByPerson[n]);

  return (
    <Card style={{marginBottom:14}}>
      <SectionHead
        title="Cost per task type"
        sub="Salary cost per work session by person · click any row to expand by client"
      />
      {people.map((name, pi) => {
        const { taskMap, taskEntries, taskByClient } = tasksByPerson[name];
        const salary  = SALARIES[name] || 2000;
        const hrCost  = salary / (4.33 * BILLABLE_TARGET);
        const tot     = Object.values(taskMap).reduce((s,v)=>s+v,0);
        const color   = PERSON_COLORS[name];
        const sorted  = Object.entries(taskMap).sort((a,b) => b[1]-a[1]);

        return (
          <div key={name}>
            {/* Person header */}
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
              padding:"10px 18px",background:"#FAFAFD",
              borderTop: pi>0 ? `1px solid ${T.border}` : "none",
              borderBottom:`1px solid ${T.border}`}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:22,height:22,borderRadius:6,background:color+"18",
                  display:"flex",alignItems:"center",justifyContent:"center",
                  fontSize:11,fontWeight:800,color}}>{name[0]}</div>
                <span style={{fontWeight:700,fontSize:12,color:T.text}}>{name}</span>
                <span style={{fontSize:11,color:T.sub}}>· {PERSON_ROLES[name]}</span>
              </div>
              <div style={{fontSize:11,fontFamily:T.mono,color:T.sub}}>
                ${salary.toLocaleString()}/mo · <span style={{color,fontWeight:600}}>${hrCost.toFixed(2)}/hr</span> · {tot.toFixed(1)}h total
              </div>
            </div>

            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead>
                <tr>
                  {["Task","Total hours","Sessions","Avg hrs / session","Cost / session","% of their work"].map((h,i)=>(
                    <th key={i} style={{padding:"7px 18px",fontSize:9,fontWeight:700,
                      letterSpacing:"0.08em",textTransform:"uppercase",

// ── AI insights ───────────────────────────────────────────────────
async function fetchAIInsights(prompt) {
  const r = await fetch(`${PROXY}/ai-proxy`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 900,
      system: "Return ONLY valid JSON arrays. No markdown, no backticks, no prose.",
      messages: [{ role: "user", content: prompt }]
    })
  });
  if (!r.ok) throw new Error("AI request failed");
  const d = await r.json();
  const raw = (d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
  return JSON.parse(raw.replace(/```json\s*/g,"").replace(/```\s*/g,"").trim());
}

function App() {
  const [range,    setRange]   = useState(8);

  const [err,      setErr]     = useState(null);
  const [insights, setInsights]= useState(null);
  const [insLoad,  setInsLoad] = useState(false);

  // Fetch Harvest data
  useEffect(() => {
    setLoading(true); setErr(null); setRaw(null); setInsights(null);
    fetch(`${PROXY}/harvest-data?weeks=${range}`)
      .then(r => r.json().then(j => ({ ok: r.ok, j })))
      .then(({ ok, j }) => { if (!ok) throw new Error(j.error); setRaw(j); })
      .catch(e => setErr(e.message))
      .finally(() => setLoading(false));
  }, [range]);

  // Compute derived data
  const C = useMemo(() => {
    if (!raw?.entries?.length) return null;
    const entries = raw.entries;

    const allWeeks  = [...new Set(entries.map(e => weekKey(e.spent_date)))].sort();
    const weekObjs  = allWeeks.map(k => ({ key: k, label: fmtWk(k) }));

    const personMap = {};
    for (const e of entries) {
      const fn = (e.user?.name || "Unknown").split(" ")[0];
      if (!personMap[fn]) personMap[fn] = { total: 0, byWeek: {} };
      personMap[fn].total += e.hours;
      const wk = weekKey(e.spent_date);
      personMap[fn].byWeek[wk] = (personMap[fn].byWeek[wk] || 0) + e.hours;
    }

    const clientMap = {};
    const clientByRole = {};
    const taskMap   = {};
    const taskEntries = {};
    const taskByClient = {};
    const tasksByPerson = {}; // { firstName: { taskMap, taskEntries, taskByClient, total } }
    const DESIGN_PEOPLE   = ["Enrique"];
    const STRATEGY_PEOPLE = ["Jeremy", "Mariana", "Laryssa"];
    const SALARIES_MAP    = { Enrique: 2000, Jeremy: 3500, Mariana: 2500, Laryssa: 2500 };

    for (const e of entries) {
      const fn = (e.user?.name || "Unknown").split(" ")[0];
      const c  = e.client?.name || "Unknown";
      if (c === "Unknown") continue;

      if (!clientByRole[c]) clientByRole[c] = { design: 0, strategy: 0 };

      // Track tasks for ALL people
      if (!tasksByPerson[fn]) tasksByPerson[fn] = { taskMap: {}, taskEntries: {}, taskByClient: {}, total: 0 };
      const pt = tasksByPerson[fn];
      const t  = e.task?.name || "Unknown";
      pt.taskMap[t]     = (pt.taskMap[t]     || 0) + e.hours;
      pt.taskEntries[t] = (pt.taskEntries[t] || 0) + 1;
      pt.total          += e.hours;
      if (!pt.taskByClient[t]) pt.taskByClient[t] = {};
      if (!pt.taskByClient[t][c]) pt.taskByClient[t][c] = { hours: 0, count: 0 };
      pt.taskByClient[t][c].hours += e.hours;
      pt.taskByClient[t][c].count += 1;

      if (DESIGN_PEOPLE.includes(fn)) {
        clientMap[c] = (clientMap[c] || 0) + e.hours;
        clientByRole[c].design += e.hours;
        taskMap[t]     = (taskMap[t] || 0) + e.hours;
        taskEntries[t] = (taskEntries[t] || 0) + 1;
        if (!taskByClient[t]) taskByClient[t] = {};
        if (!taskByClient[t][c]) taskByClient[t][c] = { hours: 0, count: 0 };
        taskByClient[t][c].hours += e.hours;
        taskByClient[t][c].count += 1;
      } else if (STRATEGY_PEOPLE.includes(fn)) {
        clientByRole[c].strategy += e.hours;
      }
    }

    const enData   = personMap["Enrique"];
    const enTotal  = enData?.total || 0;
    const enAvg    = enTotal / (allWeeks.length || 1);
    const enWeekly = enData?.byWeek || {};
    const taskTot  = Object.values(taskMap).reduce((s,v)=>s+v,0);
    const edPct    = taskTot > 0 ? (taskMap["Email Design"]||0) / taskTot : 0;

    return {
      weekObjs, personMap, clientMap, clientByRole, taskMap, taskEntries, taskByClient, tasksByPerson, taskTot,
      enTotal: Math.round(enTotal*10)/10,
      enAvg:   Math.round(enAvg*10)/10,

                  right={
                    <div style={{display:"flex",gap:16}}>
                      {[["Enrique",T.purple],["Jeremy",T.blue],["Mariana",T.green]]
                        .filter(([n])=>C.personMap[n]).map(([n,c])=>(
                        <span key={n} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:T.sub}}>
                          <span style={{width:10,height:10,borderRadius:2,background:c}}/>
                          {n} · {fh(C.personMap[n]?.total)}
                        </span>
                      ))}
                    </div>
                  }
                />
                <div style={{padding:"16px 22px 22px"}}>
                  <WeeklyChart weekObjs={C.weekObjs} personMap={C.personMap}/>
                </div>
              </Card>

              {/* ── Per-person breakdowns ── */}
              <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.12em",
                textTransform:"uppercase",color:T.sub,marginBottom:10}}>
                Individual Breakdowns
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:14}}>
                {[["Enrique",T.purple],["Jeremy",T.blue],["Mariana",T.green]]
                  .filter(([n])=>C.personMap[n])
                  .map(([name,color])=>{
                    const d     = C.personMap[name];
                    const avg   = d.total / (C.weekObjs.length||1);
                    const rate  = avg / BILLABLE_TARGET;
                    const c     = utilizationColor(rate);
                    const salary= SALARIES[name]||0;
                    const hrCost= salary/(4.33*BILLABLE_TARGET);
                    const wksLogged = C.weekObjs.filter(w=>(d.byWeek[w.key]||0)>0).length;
                    const topClient = name==="Enrique"
                      ? Object.entries(C.clientMap).filter(([k])=>k!=="Insendra").sort((a,b)=>b[1]-a[1])[0]
                      : null;
                    const trend = C.weekObjs.length>=2
                      ? (d.byWeek[C.weekObjs[C.weekObjs.length-1].key]||0) - (d.byWeek[C.weekObjs[0].key]||0)
                      : 0;

                    return (
                      <Card key={name}>
                        <div style={{display:"flex",alignItems:"stretch"}}>
                          {/* Left: identity */}
                          <div style={{width:200,flexShrink:0,padding:"20px 22px",
                            borderRight:`1px solid ${T.border}`,
                            display:"flex",flexDirection:"column",justifyContent:"center",gap:6}}>
                            <div style={{display:"flex",alignItems:"center",gap:10}}>
                              <div style={{width:36,height:36,borderRadius:10,
                                background:color+"18",display:"flex",alignItems:"center",
                                justifyContent:"center",fontSize:15,fontWeight:800,color}}>
                                {name[0]}
                              </div>
                              <div>
                                <div style={{fontWeight:700,fontSize:14}}>{name}</div>
                                <div style={{fontSize:11,color:T.sub}}>{ROLES[name]||""}</div>
                              </div>
                            </div>
                            <div style={{fontSize:10,color:T.sub,marginTop:4,lineHeight:1.7}}>
                              <div>${salary.toLocaleString()}/mo · ${hrCost.toFixed(2)}/hr</div>
                              <div>Logged {wksLogged}/{C.weekObjs.length} weeks</div>
                            </div>
                          </div>

                          {/* Middle: key numbers */}
                          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",flex:1}}>
                            {[
                              {label:"Total logged",    val:fh(d.total),          c:T.text},
                              {label:"Avg / week",      val:fh(avg),              c},
                              {label:"Utilization",     val:fpct(rate),           c},
                            ].map((s,i)=>(
                              <div key={i} style={{padding:"18px 20px",
                                borderRight:i<2?`1px solid ${T.border}`:"none"}}>
                                <div style={{fontSize:9,fontWeight:700,letterSpacing:"0.1em",
                                  textTransform:"uppercase",color:T.sub,marginBottom:8}}>{s.label}</div>
                                <div style={{fontSize:20,fontWeight:800,fontFamily:T.mono,
                                  color:s.c,lineHeight:1}}>{s.val}</div>
                              </div>
                            ))}
                          </div>

                          {/* Right: utilization bar + weekly dots + top client */}
                          <div style={{width:280,flexShrink:0,padding:"18px 22px",
                            borderLeft:`1px solid ${T.border}`,
                            display:"flex",flexDirection:"column",gap:10,justifyContent:"center"}}>
                            <UtilBar rate={rate} h={avg} target={BILLABLE_TARGET}/>
                            {/* Weekly utilization dots */}
                            <div style={{display:"flex",gap:4,alignItems:"center"}}>
                              {C.weekObjs.map(w=>{
                                const wh  = d.byWeek[w.key]||0;
                                const wr  = wh/BILLABLE_TARGET;
                                const wc  = utilizationColor(wr);
                                return (
                                  <div key={w.key} title={`${w.label}: ${wh.toFixed(1)}h`}
                                    style={{flex:1,height:24,borderRadius:4,
                                      background:wh>0?wc+"33":T.border,
                                      border:`1px solid ${wh>0?wc+"66":T.border}`,
                                      display:"flex",alignItems:"center",justifyContent:"center",
                                      fontSize:8,fontWeight:700,color:wh>0?wc:T.sub,
                                      fontFamily:T.mono,cursor:"default"}}>
                                    {wh>0?Math.round(wh):"·"}
                                  </div>
                                );
                              })}
                            </div>
                            {topClient && (
                              <div style={{fontSize:10,color:T.sub}}>
                                Top client: <strong style={{color:T.text}}>{topClient[0]}</strong> · {fh(topClient[1])} ({Math.round(topClient[1]/d.total*100)}%)
                              </div>
                            )}
                            {trend !== 0 && (
                              <div style={{fontSize:10,color:trend>0?T.red:T.green}}>
                                {trend>0?"↑":"↓"} {Math.abs(trend).toFixed(1)}h first→last week
                              </div>
                            )}
                          </div>
                        </div>
                      </Card>
                    );
                  })}
              </div>

              <Card style={{marginBottom:14}}>
                <SectionHead title="Hours by client" sub="Design + Strategy · Copy tracking coming soon"/>
                <div style={{padding:"14px 22px 22px"}}>
                  <ClientChart clientByRole={C.clientByRole}/>
                </div>
              </Card>

              {/* ── Cost per task ── */}
              <CostBreakdown tasksByPerson={C.tasksByPerson} taskTot={C.taskTot} weekCount={C.weekCount}/>

              {/* ── Team table ── */}
              <TeamTable personMap={C.personMap} weekObjs={C.weekObjs}/>

              {/* ── AI insights ── */}
              <Card style={{marginBottom:32}}>
                <SectionHead
                  title="✦ AI Capacity Analysis"
                  sub="CEO-level hiring signal and operational recommendations"
                  right={
                    <button onClick={loadInsights} disabled={insLoad}
                      style={{display:"flex",alignItems:"center",gap:6,background:"none",
                        border:`1px solid ${T.border}`,borderRadius:8,padding:"5px 12px",
                        cursor:insLoad?"not-allowed":"pointer",fontSize:11,color:T.sub,
                        fontFamily:T.sans,fontWeight:500}}>
                      {insLoad?<><Spin s={12}/> Analyzing…</>:insights?"↻ Refresh":"Analyze ✦"}
                    </button>
                  }
                />
                {insLoad ? (
                  <div style={{display:"flex",alignItems:"center",gap:10,padding:"20px",
                    color:T.sub,fontSize:13}}>
                    <Spin s={16}/> Analyzing capacity data…
                  </div>
                ) : insights ? (
                  <div style={{padding:"10px 16px"}}>
                    {insights.map((ins,i)=>{
                      const bg={good:T.greenL,warn:T.orangeL,info:T.blueL}[ins.type]||T.blueL;
                      return (
                        <div key={i} style={{display:"flex",gap:14,padding:"14px 4px",
                          borderBottom:i<insights.length-1?`1px solid ${T.border}`:"none"}}>
                          <div style={{width:38,height:38,borderRadius:10,flexShrink:0,
                            background:bg,display:"flex",alignItems:"center",
                            justifyContent:"center",fontSize:"1.1rem"}}>{ins.emoji}</div>
                          <div style={{flex:1}}>
                            <div style={{fontSize:13,fontWeight:700,marginBottom:4}}>{ins.title}</div>
                            <div style={{fontSize:12,color:T.mid,lineHeight:1.8}}>{ins.body}</div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                ) : (
                  <div style={{padding:"28px",textAlign:"center",fontSize:13,color:T.sub}}>
                    Click "Analyze ✦" to generate AI-powered hiring signal and capacity insights.
                  </div>
                )}
              </Card>
            </>
          );
        })()}

        {!loading && !err && !C && raw && (
          <Card style={{padding:"40px 24px",textAlign:"center"}}>
            <div style={{fontSize:14,color:T.sub}}>No time entries found for this period.</div>
          </Card>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
